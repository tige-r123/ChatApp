name: CD Pipeline
'on':
  push:
    branches:
    - main
    - dev
env:
  AZURE_SUBSCRIPTION_ID: 292d7ec5-6b31-42b0-8d35-aa8fff4dbaf8
  AZURE_RESOURCE_GROUP: project-rg
jobs:
  deploy-backend-project-backend-b03bad:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Backend
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install dependencies
      run: npm ci
    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: project-backend-b03bad
        slot-name: production
        package: .
        publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_BACKEND }}
    - name: Verify Backend Deployment
      run: curl -f https://project-backend-b03bad.azurewebsites.net/health || curl -f https://project-backend-b03bad.azurewebsites.net/api/health || curl -f https://project-backend-b03bad.azurewebsites.net || echo "Backend endpoint verification failed"
  deploy-frontend-project-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Frontend
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: npm
        cache-dependency-path: Frontend/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Build frontend
      run: npm run build
    - name: Set Frontend API URL
      run: echo "API_URL=https://project-backend-b03bad.azurewebsites.net" >> .env.production
    - name: Deploy to Azure Static Web Apps
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        repo_token: ${{ github.token }}
        action: upload
        app_location: Frontend
        output_location: dist
    - name: Verify Frontend Deployment
      run: curl -f https://project-frontend.azurestaticapps.net || echo "Frontend endpoint verification failed"
